---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: nudgeconfigs.appstudio.redhat.com
spec:
  group: appstudio.redhat.com
  names:
    kind: NudgeConfig
    listKind: NudgeConfigList
    plural: nudgeconfigs
    shortNames:
    - nc
    singular: nudgeconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta2
    schema:
      openAPIV3Schema:
        description: |-
          NudgeConfig is a namespace-scoped singleton CRD that stores component nudging relationships.
          Exactly one NudgeConfig named "nudge-config" may exist per namespace.
          Validation rules are enforced stateless by the API server via CEL expressions with no webhook overhead.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NudgeConfigSpec defines the desired nudging relationships
              between components.
            properties:
              nudges:
                description: Nudges is the list of component nudge relationships.
                items:
                  description: NudgeRelationship defines a single nudge from one component
                    to another.
                  properties:
                    from:
                      description: From is the source component name that triggers
                        the nudge when its build succeeds.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    gatingGroup:
                      description: GatingGroup is reserved for Phase 2 group-based
                        gating and is not enforced in Phase 1.
                      maxLength: 63
                      type: string
                    mode:
                      default: immediate
                      description: |-
                        Mode defines when the nudge is triggered.
                        "immediate" triggers on build success; "validated" triggers after integration tests pass.
                      enum:
                      - immediate
                      - validated
                      type: string
                    to:
                      description: To is the target component name that receives the
                        nudge.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                  required:
                  - from
                  - to
                  type: object
                maxItems: 256
                type: array
            type: object
            x-kubernetes-validations:
            - message: 'self-nudge not allowed: from and to must be different'
              rule: '!has(self.nudges) || self.nudges.all(n, n.from != n.to)'
            - message: duplicate (from, to) pair not allowed
              rule: '!has(self.nudges) || self.nudges.all(i, self.nudges.exists_one(j,
                i.from == j.from && i.to == j.to))'
          status:
            description: NudgeConfigStatus defines the observed state of NudgeConfig.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the NudgeConfig's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastValidationTime:
                description: LastValidationTime is the timestamp of the last successful
                  validation of the nudge graph.
                format: date-time
                type: string
            type: object
        type: object
        x-kubernetes-validations:
        - message: NudgeConfig must be named 'nudge-config' (singleton per namespace)
          rule: self.metadata.name == 'nudge-config'
    served: true
    storage: true
    subresources:
      status: {}
